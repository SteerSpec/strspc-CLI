version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - staticcheck

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
